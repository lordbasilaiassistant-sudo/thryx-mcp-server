# Smithery MCP Registry configuration — @thryx/mcp-server v1.5.0
# Publish: smithery mcp publish --name @thryx/mcp-server --transport stdio
# Or hosted: smithery mcp publish --name @thryx/mcp-server
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      THRYX_API_KEY:
        type: string
        description: "Your THRYX API key (starts with thryx_). Optional — if unset, the package auto-registers a fresh wallet on first run via POST https://thryx.fun/api/agent/register and saves the key to ~/.thryx-mcp/credentials.json. Read tools work either way."
      THRYX_BASE_URL:
        type: string
        description: "Override the launchpad base URL. Defaults to https://thryx.fun."
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@thryx/mcp-server"],
      env: {
        THRYX_API_KEY: config.THRYX_API_KEY || "",
        THRYX_BASE_URL: config.THRYX_BASE_URL || "",
      }
    })
