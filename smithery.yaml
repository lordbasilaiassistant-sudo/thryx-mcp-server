# Smithery MCP Registry configuration
# Publish: smithery mcp publish --name @thryx/mcp-server --transport stdio
# Or hosted: smithery mcp publish --name @thryx/mcp-server
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      PRIVATE_KEY:
        type: string
        description: "Your wallet private key (optional). Needed for write tools (launch, buy, sell, claim). Gasless launches sign with your key but need no ETH — relay pays gas. Read tools work without it."
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@thryx/mcp-server"],
      env: {
        PRIVATE_KEY: config.PRIVATE_KEY || ""
      }
    })
