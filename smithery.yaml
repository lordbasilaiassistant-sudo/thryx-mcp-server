# Smithery MCP Registry configuration
# Submit at: https://smithery.ai/submit
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      THRYXTREASURY_PRIVATE_KEY:
        type: string
        description: "Private key for wallet access (required for write tools: launch, buy, sell, claim). Read tools work without it."
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@thryx/mcp-server"],
      env: {
        THRYXTREASURY_PRIVATE_KEY: config.THRYXTREASURY_PRIVATE_KEY || ""
      }
    })
